{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css" rel="stylesheet"/>

  <style>
    body {
      background-image: url("{% static 'images/banner.jpg' %}");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      min-height: 100vh;
    }
    .nav-link:hover {
      color: #facc15 !important;
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <!-- ✅ Header/Nav -->
  <header class="container mx-auto px-4 py-6 flex justify-between items-center">
    <a href="{% url 'home' %}" class="logo text-3xl font-bold text-white transition duration-300 hover:text-yellow-300">eCanteen</a>
    <nav class="navbar flex items-center">
      <ul class="nav-items flex space-x-6">
        <li class="nav-item"><a href="{% url 'home' %}" class="nav-link text-white text-lg font-medium transition duration-300">Home</a></li>
      </ul>
    </nav>
    <div class="menu-togglers md:hidden">
      <i class="bx bx-menu menu-toggle transition duration-300 text-white text-2xl cursor-pointer"></i>
    </div>
  </header>

  <!-- ✅ Admin Login Form -->
  <main class="flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md bg-white bg-opacity-20 p-8 rounded-lg shadow-md backdrop-blur-md">
      <h2 class="text-3xl font-bold text-white text-center mb-2">Forgot Password</h2>
      <p class="text-white text-center mb-6">Secure access to the system</p>

      <form method="POST" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit"
          class="w-full bg-yellow-300 hover:bg-yellow-400 transition text-black font-semibold py-2 rounded">
          Send OTP
        </button>
      </form>
    </div>
  </main>



  <!-- ✅ Scripts -->
  <script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navbar = document.querySelector('.navbar');
    if (menuToggle) {
      menuToggle.addEventListener('click', () => {
        navbar.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
