{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password - Admin | eCanteen</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
  <link href="https://unpkg.com/boxicons@2.1.1/css/boxicons.min.css" rel="stylesheet"/>
  <style>
     body {
    background-image: url("{% static 'images/banner.jpg' %}");
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    color: var(--text-clr);
    min-height: 100vh;

    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
    .nav-link:hover {
      color: #facc15 !important;
      transform: translateY(-2px);
    }

    .reset-form {
  width: 100%;
  max-width: 400px;
  padding: 2rem;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(10px);
  border-radius: 12px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  margin: 0 auto;
}

.reset-form p {
  margin-bottom: 1rem;
  color: white;
}

.reset-form label {
  display: block;
  margin-bottom: 0.3rem;
  font-weight: 600;
  color: white;
}

.reset-form input[type="text"],
.reset-form input[type="password"],
.reset-form input[type="email"],
.reset-form input[type="number"] {
  width: 100%;
  padding: 0.6rem 1rem;
  border: 1px solid #ccc;
  border-radius: 8px;
  background-color: rgba(255, 255, 255, 0.2);
  color: white;
  font-size: 1rem;
  margin-bottom: 1rem;
  outline: none;
}

.reset-form input::placeholder {
  color: rgba(255, 255, 255, 0.8);
}

.reset-form input:focus {
  border-color: #facc15;
  box-shadow: 0 0 0 2px rgba(250, 204, 21, 0.3);
}

.submit-btn {
  width: 100%;
  padding: 0.8rem;
  background-color: #facc15;
  color: black;
  font-weight: 600;
  font-size: 1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.3s ease-in-out;
}

.submit-btn:hover {
  background-color: #fcd34d;
}

  </style>
</head>

<body>
  <!-- ✅ Header -->
  <header class="container mx-auto px-4 py-6 flex justify-between items-center">
    <a href="{% url 'home' %}" class="logo text-3xl font-bold text-white transition duration-300 hover:text-yellow-300">eCanteen</a>
    <nav class="navbar flex items-center">
      <ul class="nav-items flex space-x-6">
        <li class="nav-item"><a href="{% url 'home' %}" class="nav-link text-white text-lg font-medium transition duration-300">Home</a></li>
      </ul>
    </nav>
    <div class="menu-togglers md:hidden">
      <i class="bx bx-menu menu-toggle transition duration-300 text-white text-2xl cursor-pointer"></i>
    </div>
  </header>

  <!-- ✅ Reset Form -->
  <main class="flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md bg-white bg-opacity-20 p-8 rounded-lg shadow-md backdrop-blur-md">
      <h2 class="text-3xl font-bold text-white text-center mb-2">Reset Password</h2>
      <p class="text-white text-center mb-6">Enter details to reset your admin password</p>

      <form method="POST" class="reset-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="submit-btn">Reset Password</button>
      </form>
      
    </div>
  </main>



  <!-- ✅ JS -->
  <script>
    const menuToggle = document.querySelector('.menu-toggle');
    const navbar = document.querySelector('.navbar');
    if (menuToggle) {
      menuToggle.addEventListener('click', () => {
        navbar.classList.toggle('active');
      });
    }
  </script>
</body>
</html>
