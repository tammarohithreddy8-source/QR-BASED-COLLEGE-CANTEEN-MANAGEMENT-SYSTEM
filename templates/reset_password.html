
{% block content %}
  <h2 style="color:#2c3e50;">Reset Password</h2>
  <p>Enter your new password below.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.new_password.label_tag }}<br/>
    {{ form.new_password }}<br/><br/>
    
    {{ form.confirm_password.label_tag }}<br/>
    {{ form.confirm_password }}<br/><br/>

    {% if form.non_field_errors %}
      <div style="color:red;">{{ form.non_field_errors }}</div>
    {% endif %}
    
    <button type="submit" style="background:#2980b9; color:white; padding:8px 15px; border:none; border-radius:5px;">Reset Password</button>
  </form>
{% endblock %}
