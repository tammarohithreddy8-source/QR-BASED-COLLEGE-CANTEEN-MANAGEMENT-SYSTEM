
{% block content %}
  <h2 style="color:#2c3e50;">Forgot Password</h2>
  <p>Enter your registered email address to receive an OTP.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.username.label_tag }}<br/>
    {{ form.username }}<br/><br/>
    {% if form.username.errors %}
      <div style="color:red;">{{ form.username.errors }}</div>
    {% endif %}
    <button type="submit" style="background:#2980b9; color:white; padding:8px 15px; border:none; border-radius:5px;">Send OTP</button>
  </form>

  <p><a href="{% url 'staff_login' %}">Back to login</a></p>
{% endblock %}
